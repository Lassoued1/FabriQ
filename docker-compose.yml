services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fabriq
      POSTGRES_USER: fabriq_admin
      POSTGRES_PASSWORD: fabriq_admin
    ports:
      - "5432:5432"
    volumes:
      - ./backend/db/init:/docker-entrypoint-initdb.d:ro
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fabriq_admin -d fabriq"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    env_file: .env
    environment:
      FABRIQ_DATABASE_URL: postgresql://fabriq_readonly:${FABRIQ_DB_READONLY_PASSWORD}@postgres:5432/fabriq
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backend-logs:/app/logs
      - backend-alerts:/app/alerts

  frontend:
    build: ./frontend
    ports:
      - "80:8080"
    depends_on:
      - backend

  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:11.1.0
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_SECURITY_ADMIN_PASSWORD: fabriq-grafana
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana-datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro
      - ./monitoring/grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./monitoring/grafana-dashboard.json:/etc/grafana/provisioning/dashboards/fabriq.json:ro
    depends_on:
      - prometheus

volumes:
  postgres-data:
  backend-logs:
  backend-alerts:
  prometheus-data:
  grafana-data:
