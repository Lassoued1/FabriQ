name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Backend ────────────────────────────────────────────────────────────────
  backend:
    name: Backend — lint + tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: pip-

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Install ruff (linter) + pytest
        run: pip install ruff pytest pytest-subtests

      - name: Lint with ruff
        run: ruff check backend/app --select E,F,W --ignore E501
        continue-on-error: true

      - name: Run tests
        working-directory: backend
        env:
          FABRIQ_JWT_SECRET: ci-test-secret-not-for-prod
          FABRIQ_USERS: admin@fabriq.io:$2b$12$n8ydQnfhGorsB0pLo4Sbte0dpMjK3iByt8DdTSfy/nzhlW9tRmvKa:tenant_demo:admin
        run: python -m pytest tests/test_agent.py -v --tb=short

  # ─── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — type-check + build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type-check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        run: npm run build

  # ─── Playwright E2E ─────────────────────────────────────────────────────────
  e2e:
    name: Frontend — Playwright E2E
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install chromium --with-deps

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Start backend
        working-directory: backend
        env:
          FABRIQ_JWT_SECRET: ci-test-secret-not-for-prod
          FABRIQ_USERS: admin@fabriq.io:$2b$12$n8ydQnfhGorsB0pLo4Sbte0dpMjK3iByt8DdTSfy/nzhlW9tRmvKa:tenant_demo:admin
        run: uvicorn app.main:app --host 0.0.0.0 --port 8000 &

      - name: Run E2E tests
        working-directory: frontend
        env:
          CI: "true"
          VITE_API_URL: "http://localhost:8000"
        run: npx playwright test --reporter=list

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/

  # ─── Docker smoke test ──────────────────────────────────────────────────────
  docker-smoke:
    name: Docker — backend image builds
    runs-on: ubuntu-latest
    needs: backend

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t fabriq-backend:ci ./backend
